name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege default for all jobs in this workflow. None of these jobs
# write to the repo, comment on PRs, or interact with releases — they only
# need read access for `actions/checkout` and npm cache.
permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Codegen reads schema.graphql (checked in) — no API key needed.
      # Live-schema refresh happens via the schema-drift workflow.
      - run: npm run codegen

      - run: npm run typecheck

      - run: npm run test:unit

      - run: npm run build

  docs:
    name: Docs drift
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run codegen

      - run: npm run docs:check

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Only run when HIGHNOTE_API_KEY secret is available (skipped on fork PRs)
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: test

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run codegen

      # Integration tests still need the API key because they make real
      # requests against the Highnote API at runtime.
      - run: npm run test:integration
        env:
          HIGHNOTE_API_KEY: ${{ secrets.HIGHNOTE_API_KEY }}
