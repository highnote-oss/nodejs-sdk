name: Dependency Review

# Inspects the dependency tree diff introduced by a PR and fails if it
# introduces vulnerable or license-incompatible packages. Crawls the full
# resolved tree (direct + transitive) via GitHub's dependency graph, so
# transitive deps with GPL/AGPL licenses or high-severity CVEs are caught
# even when they're brought in indirectly.
#
# This workflow requires either:
#   - the repo to be public (free), OR
#   - GitHub Advanced Security on the org (paid)
# It will silently skip until one of those is true.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # actions/dependency-review-action requires the repo to be public
    # (free) or GitHub Advanced Security on the org (paid). Skip cleanly
    # while INTERNAL — the job activates automatically after public flip.
    if: ${{ github.event.repository.visibility == 'public' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/dependency-review-action@v5
        with:
          # Block PRs that add high or critical CVEs.
          fail-on-severity: high

          # Block PRs that introduce licenses incompatible with our MIT
          # distribution. Copyleft licenses would taint downstream consumers
          # of the published npm package.
          deny-licenses: >-
            GPL-2.0,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-or-later,
            AGPL-1.0,
            AGPL-1.0-or-later,
            AGPL-3.0,
            AGPL-3.0-or-later,
            LGPL-2.0,
            LGPL-2.1,
            LGPL-3.0
          # Note: LGPL is technically dynamic-link compatible with MIT, but
          # npm tarball distribution blurs the line — easier to disallow.

          # Render a summary comment on the PR with the dependency diff.
          comment-summary-in-pr: on-failure
