name: Schema Drift Detection

on:
  schedule:
    - cron: "0 14 * * 1" # Every Monday at 2pm UTC
  workflow_dispatch: # Allow manual runs

jobs:
  detect:
    name: Check for schema changes
    runs-on: ubuntu-latest
    # Only run on the canonical repo (not on forks, which won't have the API key secret)
    if: ${{ github.repository == 'highnote-oss/nodejs-sdk' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate types from current schema
        run: npm run codegen
        env:
          HIGHNOTE_API_KEY: ${{ secrets.HIGHNOTE_API_KEY }}

      - name: Regenerate docs from refreshed types
        # Schema drift cascades into doc drift (descriptions, enum members).
        # Bundling docs:gen here keeps the auto-PR self-consistent so it
        # passes its own docs-drift CI step.
        run: npm run docs:gen

      - name: Check for user-visible schema changes
        id: diff
        # src/generated/ is gitignored, so we can't diff against the previous
        # generated types. Instead we use the regenerated docs/ tree as the
        # drift signal — anything that affects the public surface (resource
        # method signatures, enum members, descriptions) shows up there.
        # This misses schema changes to types no resource exposes; that's
        # acceptable since they have no user impact until a code change
        # adds resource coverage.
        run: |
          if git diff --quiet docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No user-visible schema changes detected in docs/."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            # Classify by docs diff size — additions vs removals signals
            # whether this is a feature add or a breaking change.
            DIFF=$(git diff docs/SDK_REFERENCE.md)
            ADDED=$(echo "$DIFF" | grep -c '^+' || true)
            REMOVED=$(echo "$DIFF" | grep -c '^-' || true)

            if [ "$REMOVED" -gt 20 ]; then
              echo "label=breaking-change" >> "$GITHUB_OUTPUT"
              echo "severity=major" >> "$GITHUB_OUTPUT"
            else
              echo "label=schema-update" >> "$GITHUB_OUTPUT"
              echo "severity=minor" >> "$GITHUB_OUTPUT"
            fi

            echo "User-visible schema changes detected in docs/ (additions: $ADDED, removals: $REMOVED)"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh docs from updated Highnote schema"
          branch: chore/schema-drift
          delete-branch: true
          title: "chore: Highnote schema update detected (${{ steps.diff.outputs.severity }})"
          labels: ${{ steps.diff.outputs.label }},automated
          body: |
            ## Schema Drift Detected

            The Highnote GraphQL API schema has changed in ways that affect the
            SDK's public surface. This PR contains the regenerated documentation
            so reviewers can see exactly what consumers will see.

            `src/generated/graphql.ts` is gitignored and regenerates fresh on
            every CI run from the live schema; the docs diff is the
            authoritative artifact of user-visible change.

            **Severity:** `${{ steps.diff.outputs.severity }}` (based on doc diff size)

            ### Review checklist

            - [ ] Review the doc diff (`docs/SDK_REFERENCE.md`, `docs/resources/*.md`) for new, removed, or renamed types and enum members
            - [ ] Check if any new types should be exposed as new resource methods
            - [ ] Update affected resource files if return types changed
            - [ ] Add `@deprecated` JSDoc to any deprecated fields
            - [ ] Run `npm run test:unit` and `npm run test:integration` against a local codegen to verify the SDK still compiles and the integration surface is intact
            - [ ] Determine version bump: patch (no public API change beyond doc descriptions), minor (new fields/enums), major (removed/changed fields)
