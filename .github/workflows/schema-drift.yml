name: Schema Drift Detection

on:
  schedule:
    - cron: "0 14 * * 1" # Every Monday at 2pm UTC
  workflow_dispatch: # Allow manual runs

# Needs write to push the chore/schema-drift branch and create the PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    name: Check for schema changes
    runs-on: ubuntu-latest
    # Only run on the canonical repo (not on forks, which won't have the API key secret)
    if: ${{ github.repository == 'highnote-oss/nodejs-sdk' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh checked-in schema snapshot
        # This is the *only* place we hit the live Highnote API for schema
        # purposes. Everything downstream (codegen, docs:gen) reads from the
        # refreshed schema.graphql on disk.
        run: npm run schema:fetch
        env:
          HIGHNOTE_API_KEY: ${{ secrets.HIGHNOTE_API_KEY }}

      - name: Regenerate types from refreshed schema
        run: npm run codegen

      - name: Regenerate docs from refreshed types
        # Schema drift cascades into doc drift (descriptions, enum members).
        # Bundling docs:gen here keeps the auto-PR self-consistent so it
        # passes its own docs-drift CI step.
        run: npm run docs:gen

      - name: Check for schema or docs changes
        id: diff
        # We diff schema.graphql + docs/ together. The schema file catches
        # everything (including changes that don't surface in docs, like
        # internal types); docs/ catches the user-visible surface.
        run: |
          if git diff --quiet schema.graphql docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schema changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema changes detected."
          fi

      - name: Fetch schema changelog from Highnote API
        # Queries Query.schemaChangelogs for entries within the lookback
        # window. Emits authoritative severity (BREAKING/DANGEROUS/NON_BREAKING)
        # plus a formatted markdown body listing each change by criticality —
        # much richer signal than the previous doc-diff line-count heuristic.
        if: steps.diff.outputs.changed == 'true'
        id: changelog
        run: npx tsx scripts/fetch-schema-changelog.ts --out drift-body.md
        env:
          HIGHNOTE_API_KEY: ${{ secrets.HIGHNOTE_API_KEY }}
          HIGHNOTE_ENVIRONMENT: ${{ vars.HIGHNOTE_ENVIRONMENT || 'test' }}
          SCHEMA_CHANGELOG_DAYS: "14"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          # Uses a fine-grained PAT (DRIFT_BOT_TOKEN) instead of GITHUB_TOKEN
          # because the enterprise policy blocks Actions' built-in token from
          # creating PRs. PAT scoped to contents:write + pull-requests:write
          # on highnote-oss/nodejs-sdk only.
          # Rotation: regenerate at https://github.com/settings/personal-access-tokens,
          # then `gh secret set DRIFT_BOT_TOKEN --repo highnote-oss/nodejs-sdk`.
          token: ${{ secrets.DRIFT_BOT_TOKEN }}
          commit-message: "chore: refresh docs from updated Highnote schema"
          branch: chore/schema-drift
          delete-branch: true
          title: "chore: Highnote schema update detected (${{ steps.changelog.outputs.severity }})"
          labels: ${{ steps.changelog.outputs.label }},automated
          body-path: drift-body.md
