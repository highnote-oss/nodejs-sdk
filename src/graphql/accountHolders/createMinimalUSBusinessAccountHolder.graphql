mutation CreateMinimalUSBusinessAccountHolder($input: CreateMinimalUSBusinessAccountHolderInput!) {
  createMinimalUSBusinessAccountHolder(input: $input) {
    ... on USBusinessAccountHolder {
      __typename
      id
      externalId
      createdAt
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
