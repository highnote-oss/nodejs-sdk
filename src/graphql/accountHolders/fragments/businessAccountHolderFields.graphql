fragment BusinessAccountHolderFields on USBusinessAccountHolder {
  __typename
  id
  externalId
  createdAt
  updatedAt
  cardProductApplications(first: 20) {
    edges {
      node {
        id
        applicationState {
          status
        }
        applicationWorkflows {
          executionOrder
          status
          workflowType
        }
        accountHolderSnapshot {
          ... on USBusinessAccountHolderSnapshot {
            currentVerification {
              status
              reason
              results {
                code
                description
              }
            }
          }
        }
        cardProduct {
          id
          name
        }
        createdAt
        decisionedAt
      }
    }
  }
  financialAccounts(first: 20) {
    edges {
      node {
        id
        name
        accountStatus
        externalId
        createdAt
        ledgers {
          id
          name
          creditBalance {
            value
            currencyCode
          }
          debitBalance {
            value
            currencyCode
          }
        }
        paymentCards(first: 20) {
          edges {
            node {
              id
              last4
              status
              formFactor
              network
              expirationDate
            }
          }
        }
      }
    }
  }
  externalFinancialAccounts(first: 20) {
    edges {
      node {
        ... on ExternalFinancialBankAccount {
          __typename
          id
          name
          accountStatus
          createdAt
          externalBankAccountDetails {
            id
            last4
            type
          }
        }
        ... on NonVerifiedExternalUSFinancialBankAccount {
          __typename
          id
          name
          accountStatus
          createdAt
          externalBankAccountDetails {
            id
            last4
            routingNumber
            type
          }
        }
      }
    }
  }
}
