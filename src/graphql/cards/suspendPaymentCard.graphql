mutation SuspendPaymentCard($input: SuspendPaymentCardInput!) {
  suspendPaymentCard(input: $input) {
    ... on PaymentCard {
      __typename
      id
      bin
      last4
      network
      status
      formFactor
      expirationDate
      expirationMonth
      expirationYear
      externalId
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
