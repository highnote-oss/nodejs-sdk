mutation AddCollaborativeAuthorizationEndpoint($input: AddCollaborativeAuthorizationEndpointInput!) {
  addCollaborativeAuthorizationEndpoint(input: $input) {
    ... on CollaborativeAuthorizationEndpoint {
      __typename
      id
      name
      uri
      status
      signingKeys {
        id
        secret
        createdAt
        expiresAt
      }
      createdAt
      updatedAt
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
