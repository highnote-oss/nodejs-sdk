mutation RenameCollaborativeAuthorizationEndpoint(
  $input: RenameCollaborativeAuthorizationEndpointInput!
) {
  renameCollaborativeAuthorizationEndpoint(input: $input) {
    ... on CollaborativeAuthorizationEndpoint {
      __typename
      id
      name
      uri
      status
      createdAt
      updatedAt
    }
    ... on UserError {
      __typename
      errors { code errorPath description }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
