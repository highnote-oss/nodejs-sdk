mutation AddPaymentCardToGooglePayByDevicePushProvisioning($input: AddPaymentCardToGooglePayByDevicePushProvisioningInput!) {
  addPaymentCardToGooglePayByDevicePushProvisioning(input: $input) {
    ... on PaymentCardDigitalWalletTokenGooglePayPushProvisioning {
      __typename
      opaquePaymentCard
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
