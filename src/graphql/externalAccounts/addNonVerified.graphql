mutation AddNonVerifiedExternalUSFinancialBankAccount($input: AddNonVerifiedExternalUSFinancialBankAccountInput!) {
  addNonVerifiedExternalUSFinancialBankAccount(input: $input) {
    ... on NonVerifiedExternalUSFinancialBankAccount {
      __typename
      id
      name
      createdAt
      updatedAt
      externalBankAccountDetails {
        id
        last4
        routingNumber
        type
      }
    }
    ... on UserError {
      __typename
      errors {
        code
        description
        errorPath
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
