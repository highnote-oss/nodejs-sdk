mutation AttachSpendRuleToPaymentCard($input: AttachSpendRuleToPaymentCardInput!) {
  attachSpendRuleToPaymentCard(input: $input) {
    ... on PaymentCard {
      __typename
      id
      status
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
