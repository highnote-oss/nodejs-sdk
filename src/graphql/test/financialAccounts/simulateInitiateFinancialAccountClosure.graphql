mutation SimulateInitiateFinancialAccountClosure($input: SimulateInitiateFinancialAccountClosureInput!) {
  simulateInitiateFinancialAccountClosure(input: $input) {
    ... on FinancialAccount {
      __typename
      id
      accountStatus
      name
      createdAt
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
