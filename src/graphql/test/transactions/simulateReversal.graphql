mutation SimulateReversal($input: SimulateReversalInput!) {
  simulateReversal(input: $input) {
    ... on ReversalEvent {
      __typename
      id
      approvedAmount {
        value
        currencyCode
      }
      createdAt
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
