mutation SimulateSingleStepAuthAndClear($input: SimulateSingleStepAuthAndClearInput!) {
  simulateSingleStepAuthAndClear(input: $input) {
    ... on AuthorizationAndClearEvent {
      __typename
      id
      approvedAmount {
        value
        currencyCode
      }
      merchantDetails {
        merchantId
        name
        categoryCode
        countryCodeAlpha3
      }
      createdAt
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
