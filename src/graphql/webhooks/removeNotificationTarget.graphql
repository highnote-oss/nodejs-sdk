mutation RemoveNotificationTarget($input: RemoveNotificationTargetInput!) {
  removeNotificationTarget(input: $input) {
    ... on WebhookNotificationTarget {
      __typename
      id
      name
      status
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
