mutation SetEmailForNotificationTarget($input: SetEmailForNotificationTargetInput!) {
  setEmailForNotificationTarget(input: $input) {
    ... on WebhookNotificationTarget {
      __typename
      id
      name
      email
      status
    }
    ... on UserError {
      __typename
      errors {
        code
        errorPath
        description
      }
    }
    ... on AccessDeniedError {
      __typename
      message
    }
  }
}
